server:
  port: 8086

spring:
  application:
    name: notification-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}

app:
  mail-from: ${MAIL_FROM:no-reply@soundclown.local}
  reset-password-url: ${RESET_PASSWORD_URL:http://localhost:3000/reset-password}

management:
  endpoints:
    web:
      exposure:
        include: health,info
