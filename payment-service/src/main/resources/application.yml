server:
  port: 8087

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-min-32-characters-long}

# Premium plan: one purchase grants `duration-days` of premium for `price-vnd`.
premium:
  price-vnd: ${PREMIUM_PRICE_VND:50000}
  duration-days: ${PREMIUM_DURATION_DAYS:30}

# VNPay sandbox. Register at https://sandbox.vnpayment.vn to get tmn-code + hash-secret.
vnpay:
  tmn-code: ${VNP_TMN_CODE:}
  hash-secret: ${VNP_HASH_SECRET:}
  pay-url: ${VNP_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  # VNPay redirects the user's browser here after paying (must reach this service via the gateway).
  return-url: ${VNP_RETURN_URL:http://localhost:8080/api/payments/vnpay-return}
  version: "2.1.0"
  command: pay
  order-type: other
  locale: ${VNP_LOCALE:vn}

# Where this service 302-redirects the browser after verifying the VNPay return (FE result page).
payment:
  result-url: ${PAYMENT_RESULT_URL:http://localhost:3000/payment-result}
