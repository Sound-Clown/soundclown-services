server:
  port: 8087

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-min-32-characters-long}

# Premium plan: one purchase grants `duration-days` of premium.
premium:
  duration-days: ${PREMIUM_DURATION_DAYS:30}

# Stripe Checkout. Test mode: get a secret key (sk_test_...) from
# https://dashboard.stripe.com/test/apikeys — no merchant approval needed.
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  # BE endpoint Stripe redirects the browser back to (must reach this service via the gateway).
  return-url: ${STRIPE_RETURN_URL:http://localhost:8080/api/payments/stripe-return}
  price-cents: ${STRIPE_PRICE_CENTS:200}     # 200 = $2.00
  currency: ${STRIPE_CURRENCY:usd}
  product-name: ${STRIPE_PRODUCT_NAME:SoundClown Premium (30 days)}

# Where this service 302-redirects the browser after verifying a return (FE result page).
payment:
  result-url: ${PAYMENT_RESULT_URL:http://localhost:3000/payment-result}
