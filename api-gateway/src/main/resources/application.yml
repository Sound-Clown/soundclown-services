server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        - id: song-service
          uri: ${SONG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/songs/**,/api/albums/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/users/**

        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/upload/**

        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/search/**

        # Aggregate each service's OpenAPI spec under the gateway's Swagger UI.
        - id: auth-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs
        - id: song-docs
          uri: ${SONG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/song
          filters:
            - RewritePath=/v3/api-docs/song, /v3/api-docs
        - id: user-docs
          uri: ${USER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - RewritePath=/v3/api-docs/user, /v3/api-docs
        - id: media-docs
          uri: ${MEDIA_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/v3/api-docs/media
          filters:
            - RewritePath=/v3/api-docs/media, /v3/api-docs
        - id: search-docs
          uri: ${SEARCH_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v3/api-docs/search
          filters:
            - RewritePath=/v3/api-docs/search, /v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /v3/api-docs/auth
      - name: song-service
        url: /v3/api-docs/song
      - name: user-service
        url: /v3/api-docs/user
      - name: media-service
        url: /v3/api-docs/media
      - name: search-service
        url: /v3/api-docs/search

management:
  endpoints:
    web:
      exposure:
        include: health,info
