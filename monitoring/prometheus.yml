# Prometheus scrapes each service's Actuator Prometheus endpoint over the compose network.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: soundclown-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - auth-service:8081
          - song-service:8082
          - user-service:8083
          - search-service:8084
          - media-service:8085
          - notification-service:8086
        labels:
          stack: soundclown
