server:
  port: 8085

spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-min-32-characters-long}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:000000000000000}
  api-secret: ${CLOUDINARY_API_SECRET:dummy-secret}
