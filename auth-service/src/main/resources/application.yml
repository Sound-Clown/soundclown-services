server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-min-32-characters-long}
  expiry-days: ${JWT_EXPIRY_DAYS:7}

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8083}

password-reset:
  token-ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:30}
